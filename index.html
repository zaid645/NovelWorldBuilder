<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Lore Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Scrollbar kustom agar serasi dengan Dark Mode */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .toggle-content { transition: max-height 0.3s ease-in-out; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 h-screen flex font-sans overflow-hidden text-sm sm:text-base">

    <!-- OVERLAY SIDEBAR (Khusus Mobile) -->
    <div id="sidebarOverlay" onclick="app.toggleSidebar(false)" class="fixed inset-0 bg-black bg-opacity-50 z-10 hidden sm:hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col transition-all duration-300 absolute sm:relative z-20 h-full -translate-x-full sm:translate-x-0">
        <!-- Sidebar Header -->
        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900">
            <h1 class="text-xl font-bold text-indigo-400">Lore Manager</h1>
            <button id="closeSidebarBtn" class="sm:hidden text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Sidebar Navigation (Scrollable) -->
        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <!-- Menu Utama -->
            <div>
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Menu Utama</h3>
                <nav id="mainMenuList" class="space-y-1">
                    <!-- Di-render dinamis oleh MainScript.js -> renderSidebar() -->
                </nav>
            </div>

            <!-- Opsi Fantasi; Skill, Pet, dan Item -->
            <div>
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Opsi Fantasi</h3>
                <nav id="fantasyMenuList" class="space-y-1">
                    <!-- Di-render dinamis oleh MainScript.js -> renderSidebar() -->
                </nav>
            </div>

            <!-- Daftar Semesta / Universe -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Semesta (Universe)</h3>
                    <button onclick="app.addUniverse()" class="text-indigo-400 hover:text-indigo-300 text-xs flex items-center space-x-1" title="Tambah Semesta Baru">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <span>Tambah</span>
                    </button>
                </div>
                <nav id="universeList" class="space-y-1">
                    <!-- Di-render dinamis oleh MainScript.js -> renderSidebar() -->
                </nav>
            </div>
        </div>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-slate-700 bg-slate-900 text-xs text-slate-400 space-y-2">
            <div class="flex justify-between">
                <span>Auto Save:</span>
                <span class="text-emerald-400 font-medium">Aktif (2m)</span>
            </div>
            <div class="flex justify-between">
                <span>Terakhir Disimpan:</span>
                <span id="lastSavedText" class="text-slate-300 font-medium">-</span>
            </div>
        </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="flex-1 flex flex-col min-w-0 h-full">
        <!-- Header Atas -->
        <header class="h-16 bg-slate-800 border-b border-slate-700 px-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center space-x-3">
                <!-- Tombol Hamburguer Menu -->
                <button onclick="app.toggleSidebar()" class="p-2 rounded bg-slate-700 text-slate-300 hover:text-white" title="Toggle Sidebar">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h2 id="currentViewTitle" class="text-base sm:text-lg font-bold text-slate-100 truncate">Memuat...</h2>
            </div>

            <!--Aksi Master Data -->
            <div class="flex items-center space-x-2 sm:space-x-4">
                <!-- Kelompok Tombol Import/Export -->
                <div class="flex items-center space-x-1 sm:space-x-2">
                    <!-- Import Master Data -->
                    <label class="cursor-pointer bg-slate-700 hover:bg-slate-600 text-slate-300 px-2.5 py-1.5 rounded text-xs font-semibold flex items-center space-x-1" title="Import File JSON Master">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        <span class="hidden sm:inline">Import</span>
                        <input type="file" id="importMasterInput" onchange="app.importMaster(event)" class="hidden" accept=".json">
                    </label>

                    <!-- Export Master Data -->
                    <button onclick="app.exportMaster()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-2.5 py-1.5 rounded text-xs font-semibold flex items-center space-x-1" title="Export File JSON Master">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        <span class="hidden sm:inline">Export Master</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- AREA KONTEN DINAMIS -->
        <section id="contentArea" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-24 sm:pb-12 bg-slate-900">
            <!-- Isi konten utama seperti form cerita, skill grid, atau halaman universe akan dirender di sini oleh app.switchView() -->
            <div class="flex items-center justify-center h-full">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500 mx-auto mb-4"></div>
                    <p class="text-slate-400">Sedang memuat data aplikasi...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- ALERTS / NOTIFICATION BANNER -->
    <div id="alertBanner" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded shadow-lg transition-opacity duration-300 z-50 opacity-0 pointer-events-none"></div>

    <!-- MODAL CONTAINER GLOBAL (Jika Diperlukan untuk Popup Form) -->
    <div id="modalContainer" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-40 hidden">
        <!-- Konten modal akan disisipkan di sini secara dinamis -->
    </div>

    <!-- MEMANGGIL MODUL UTAMA (ES MODULE) -->
    <script type="module" src="./js/MainScript.js"></script>
</body>
</html>
